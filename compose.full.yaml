services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexusops
    volumes:
      - nexusops_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexusops"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine
    command: redis-server --appendonly yes
    volumes:
      - nexusops_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://nexus:nexus@postgres:5432/nexusops
      REDIS_URL: redis://redis:6379
      DEMO_TENANT_ID: 11111111-1111-4111-8111-111111111111
      DEMO_MODE: "true"
      API_KEY: nexus-demo-key
      WEB_ORIGINS: http://localhost:8080
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      HUBSPOT_ACCESS_TOKEN: ${HUBSPOT_ACCESS_TOKEN:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://nexus:nexus@postgres:5432/nexusops
      REDIS_URL: redis://redis:6379
      DEMO_MODE: "true"
      HUBSPOT_ACCESS_TOKEN: ${HUBSPOT_ACCESS_TOKEN:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4000
        VITE_API_KEY: nexus-demo-key
        VITE_TENANT_ID: 11111111-1111-4111-8111-111111111111
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  nexusops_postgres:
  nexusops_redis:
