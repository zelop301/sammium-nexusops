services:
  postgres:
    image: postgres:17-alpine
    container_name: nexusops-postgres
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexusops
    ports:
      - "5432:5432"
    volumes:
      - nexusops_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexusops"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: nexusops-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - nexusops_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  nexusops_postgres:
  nexusops_redis:
